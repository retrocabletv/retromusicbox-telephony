name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install luacheck via luarocks
        # Ubuntu 24.04 (noble) dropped the `luacheck` apt package, so we
        # install it via luarocks instead. The `lua5.3` + `liblua5.3-dev`
        # pair is what luarocks on noble targets by default.
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks lua5.3 liblua5.3-dev
          sudo luarocks install luacheck
      - name: Lint Lua scripts
        run: |
          luacheck scripts/ \
            --globals freeswitch session argv \
            --no-unused-args \
            --no-max-line-length

  validate-xml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: Validate config XML well-formedness
        run: find conf -name '*.xml' -print0 | xargs -0 -n1 xmllint --noout
