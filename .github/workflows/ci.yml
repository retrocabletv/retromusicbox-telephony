name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install luacheck via luarocks
        # Ubuntu 24.04 (noble) dropped the `luacheck` apt package, so we
        # install it via luarocks instead. The `lua5.3` + `liblua5.3-dev`
        # pair is what luarocks on noble targets by default.
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks lua5.3 liblua5.3-dev
          sudo luarocks install luacheck
      - name: Lint Lua scripts
        run: |
          luacheck scripts/ \
            --globals freeswitch session argv \
            --no-unused-args \
            --no-max-line-length

  validate-xml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: Validate dialplan XML well-formedness
        run: find conf -name '*.xml' -print0 | xargs -0 -n1 xmllint --noout

  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Detect SignalWire token
        id: signalwire-token
        shell: bash
        env:
          SIGNALWIRE_TOKEN: ${{ secrets.SIGNALWIRE_TOKEN }}
        run: |
          if [ -n "$SIGNALWIRE_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip Docker build smoke test when secret is unavailable
        if: ${{ steps.signalwire-token.outputs.present != 'true' }}
        run: echo "SIGNALWIRE_TOKEN is not set; skipping Docker build smoke test."
      - name: Build image with BuildKit secret
        if: ${{ steps.signalwire-token.outputs.present == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          tags: retromusicbox-telephony:ci
          secrets: |
            signalwire_token=${{ secrets.SIGNALWIRE_TOKEN }}
      - name: Start FreeSWITCH smoke container
        if: ${{ steps.signalwire-token.outputs.present == 'true' }}
        run: |
          docker run -d --name rmb-freeswitch-smoke \
            -e RMBD_URL=http://127.0.0.1:8080 \
            -e RMB_EXTERNAL_IP=127.0.0.1 \
            retromusicbox-telephony:ci
      - name: Wait for healthy container
        if: ${{ steps.signalwire-token.outputs.present == 'true' }}
        run: |
          for i in $(seq 1 20); do
            status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' rmb-freeswitch-smoke)"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              docker logs rmb-freeswitch-smoke
              exit 1
            fi
            sleep 3
          done
          docker logs rmb-freeswitch-smoke
          exit 1
      - name: Check FreeSWITCH status
        if: ${{ steps.signalwire-token.outputs.present == 'true' }}
        run: docker exec rmb-freeswitch-smoke fs_cli -x status | grep '^UP '
      - name: Show container logs on failure
        if: ${{ failure() && steps.signalwire-token.outputs.present == 'true' }}
        run: docker logs rmb-freeswitch-smoke || true
      - name: Remove smoke container
        if: ${{ always() && steps.signalwire-token.outputs.present == 'true' }}
        run: docker rm -f rmb-freeswitch-smoke || true
