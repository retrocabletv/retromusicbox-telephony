name: release-please

on:
  push:
    branches: [main]
  schedule:
    # Daily safety net: Dependabot auto-merges via GITHUB_TOKEN don't trigger
    # downstream workflows, so schedule a catch-up run to pick up merged bumps.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag (e.g. v0.2.0) to rebuild the container image for"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve tag to build
        id: tag
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.release.outputs.release_created }}" = "true" ]; then
            echo "tag_name=${{ steps.release.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tagged commit
        if: ${{ steps.tag.outputs.should_build == 'true' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag_name }}

      - name: Set up QEMU
        if: ${{ steps.tag.outputs.should_build == 'true' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        if: ${{ steps.tag.outputs.should_build == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to ${{ env.REGISTRY }}
        if: ${{ steps.tag.outputs.should_build == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: ${{ steps.tag.outputs.should_build == 'true' }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push image
        if: ${{ steps.tag.outputs.should_build == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SIGNALWIRE_TOKEN=${{ secrets.SIGNALWIRE_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Append image reference to release notes
        if: ${{ steps.tag.outputs.should_build == 'true' && steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          IMAGE_TAG="${TAG_NAME#v}"
          IMAGE="ghcr.io/${{ github.repository }}:${IMAGE_TAG}"
          gh release view "$TAG_NAME" --json body --jq '.body' > /tmp/body.md
          {
            echo ""
            echo "---"
            echo ""
            echo "**Container image**: \`${IMAGE}\`"
          } >> /tmp/body.md
          gh release edit "$TAG_NAME" --notes-file /tmp/body.md
