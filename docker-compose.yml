services:
  freeswitch:
    image: ghcr.io/alexkinch/retromusicbox-telephony:latest
    # Uncomment and comment out `image:` above to build from source instead of
    # pulling the released image.
    # build:
    #   context: .
    #   args:
    #     SIGNALWIRE_TOKEN: ${SIGNALWIRE_TOKEN}
    container_name: rmb-freeswitch
    # Host networking. On Linux this attaches the container to the host's
    # network namespace — sofia binds and advertises real host interfaces,
    # the wide RTP port range works without per-port mapping, and softphones
    # on the LAN reach FreeSWITCH at the host's IP. macOS + Docker Desktop /
    # OrbStack / Colima cannot expose UDP cleanly this way; run on a Linux
    # host (NAS, VPS, Pi, Linux VM with bridged networking) for real use.
    network_mode: host
    environment:
      # URL of the retromusicbox REST API. On the same host this is usually
      # http://localhost:8080; in a paired compose stack use the rmbd service
      # name.
      RMBD_URL: ${RMBD_URL:-http://localhost:8080}
      RMBD_HTTP_TIMEOUT: "15"
      RMB_MAX_RETRIES: "3"
      # Optional: override the IP sofia advertises in SDP. Leave unset and
      # sofia auto-detects the primary interface, which is the right default
      # with host networking on Linux.
      # RMB_EXTERNAL_IP: ""
    # For iterating on prompt recordings without rebuilding the image, mount
    # a local sounds/ directory over the baked-in path:
    # volumes:
    #   - ./sounds:/var/lib/freeswitch/sounds/retromusicbox/en:ro
    restart: unless-stopped
